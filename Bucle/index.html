<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <input type="number" id="number1" placeholder="Insert number 1">
        <input type="number" id="number2" placeholder="Insert number 2">
        <select id="operation">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="x">x</option>
            <option value="÷">÷</option>
        </select>
        <button onclick="calculate()">Calculate</button>
        <div id="message">
        </div>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
