<h1>Actividad 2.3 - Estadísticas</h1>

<script>

// Nombre: Andres
// Ficha: ADSO
// Actividad: 2.3

function estadisticas(...numeros) {

  if (numeros.length == 0) {
    return null;
  }

  let suma = 0;

  for (let numero of numeros) {
    suma = suma + numero;
  }

  let minimo = Math.min(...numeros);

  let maximo = Math.max(...numeros);

  let promedio = suma / numeros.length;

  return {

    minimo: minimo,

    maximo: maximo,

    promedio: promedio,

    suma: suma

  };

}

console.log(estadisticas(1, 2, 3, 4, 5));

console.log(estadisticas(10, 20, 30));

console.log(estadisticas());

</script>
